<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系客服 - AnyHop AI</title>
    <style>
        :root{--bg:#fafafa;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--accent:#8b5cf6;--accent2:#6d28d9;--card:#ffffff}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}

        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.25)}50%{box-shadow:0 0 0 10px rgba(16,185,129,0)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

        .page{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 20px 30px}

        .header{text-align:center;margin-bottom:40px;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
        .header-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 10px 30px rgba(139,92,246,.25);animation:float 3s ease-in-out infinite}
        .header-icon svg{width:30px;height:30px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
        .header h1{font-size:1.6rem;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
        .header p{font-size:.88rem;color:var(--muted);line-height:1.6;max-width:360px;margin:0 auto}

        .online-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);padding:3px 12px 3px 8px;border-radius:20px;font-size:.72rem;font-weight:600;color:#059669}
        .online-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#10b981;animation:pulse 2s ease infinite}

        .cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:560px;width:100%;margin-bottom:36px}

        .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:30px 24px;text-align:center;transition:all .35s cubic-bezier(.22,1,.36,1);animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0}
        .card:nth-child(1){animation-delay:.1s}
        .card:nth-child(1)::before{background:linear-gradient(90deg,#10b981,#34d399)}
        .card:nth-child(2){animation-delay:.15s}
        .card:nth-child(2)::before{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
        .card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.07);border-color:#d1d5db}

        .card-avatar{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
        .card-avatar svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
        .card-avatar.a1{background:linear-gradient(135deg,#f0fdf4,#dcfce7);color:#16a34a}
        .card-avatar.a2{background:linear-gradient(135deg,#eff6ff,#dbeafe);color:#2563eb}

        .card-label{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
        .card-wechat{font-size:1.1rem;font-weight:700;color:var(--text);letter-spacing:.5px;margin-bottom:16px;font-family:"SF Mono","Fira Code",monospace}
        .card-copy{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:10px;font-size:.8rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .3s cubic-bezier(.22,1,.36,1);font-family:inherit}
        .card-copy:hover{border-color:var(--accent);color:var(--accent);background:rgba(139,92,246,.03);transform:translateY(-1px)}
        .card-copy:active{transform:translateY(0)}
        .card-copy.copied{border-color:#10b981;color:#10b981;background:rgba(16,185,129,.04)}
        .card-copy svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

        .qr-section{max-width:560px;width:100%;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .2s both}
        .qr-title{font-size:.85rem;font-weight:700;text-align:center;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:10px;color:var(--muted)}
        .qr-title::before,.qr-title::after{content:'';flex:1;max-width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--border))}
        .qr-title::after{background:linear-gradient(90deg,var(--border),transparent)}

        .qr-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
        .qr-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;text-align:center;transition:all .35s cubic-bezier(.22,1,.36,1)}
        .qr-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.06)}

        /* =============================================
           二维码图片设置说明：
           1. 将二维码图片上传到你的服务器或图床
           2. 把下面 .qr-img 的 src 属性改成你的图片链接
           3. 图片建议尺寸：400x400px，PNG 或 JPG 格式
           ============================================= */
        .qr-img-wrap{width:180px;height:180px;border-radius:14px;margin:0 auto 14px;overflow:hidden;background:#f9fafb;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:border-color .3s}
        .qr-card:hover .qr-img-wrap{border-color:#c4b5fd}
        .qr-img{width:100%;height:100%;object-fit:cover;display:block}

        .qr-empty{width:180px;height:180px;border-radius:14px;background:#f9fafb;border:2px dashed var(--border);margin:0 auto 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#c4b5fd;gap:6px;transition:all .3s}
        .qr-empty svg{width:36px;height:36px;fill:none;stroke:#c4b5fd;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
        .qr-empty span{font-size:.72rem;color:var(--muted)}
        .qr-card:hover .qr-empty{border-color:#c4b5fd;background:rgba(139,92,246,.02)}

        .qr-card-label{font-size:.82rem;color:var(--text);font-weight:600}
        .qr-card-sub{font-size:.72rem;color:var(--muted);margin-top:2px}

        .notice{max-width:560px;width:100%;margin-top:32px;padding:18px 22px;border-radius:14px;background:linear-gradient(135deg,rgba(139,92,246,.04),rgba(99,102,241,.02));border:1px solid rgba(139,92,246,.1);display:flex;align-items:flex-start;gap:12px;font-size:.82rem;color:var(--muted);line-height:1.7;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .25s both}
        .notice-icon{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:2px}

        @media(max-width:500px){
            .cards{grid-template-columns:1fr}
            .qr-grid{grid-template-columns:1fr}
            .page{padding:28px 16px 20px}
            .qr-img-wrap,.qr-empty{width:200px;height:200px}
        }
    </style>
</head>

</div>

<script>
function copyWechat(btn, text) {
    navigator.clipboard.writeText(text).then(function() {
        var orig = btn.innerHTML;
        btn.classList.add('copied');
        btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg> 已复制';
        setTimeout(function() {
            btn.classList.remove('copied');
            btn.innerHTML = orig;
        }, 2000);
    });
}
