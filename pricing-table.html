<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倍率价格表 - AnyHop AI</title>
    <style>
        :root{--bg:#f8fafc;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--accent:#8b5cf6;--card:#fff}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;padding:24px 28px}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

        .container{max-width:1440px;margin:0 auto}
        .page-header{margin-bottom:24px;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
        .page-header h1{font-size:1.3rem;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
        .page-header p{font-size:.82rem;color:var(--muted)}

        .group-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:28px;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .05s both}
        .group-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;transition:all .3s cubic-bezier(.22,1,.36,1)}
        .group-card:hover{box-shadow:0 6px 24px rgba(0,0,0,.06);transform:translateY(-2px)}
        .group-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
        .group-badge{font-size:1.5rem;font-weight:800;color:var(--accent)}
        .group-tag{font-size:.68rem;font-weight:700;padding:3px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
        .tag-gpt{background:#f0fdf4;color:#16a34a}
        .tag-claude{background:#fff7ed;color:#ea580c}
        .tag-all{background:#f5f3ff;color:#7c3aed}
        .group-name{font-size:.88rem;font-weight:700;margin-bottom:4px}
        .group-desc{font-size:.76rem;color:var(--muted);line-height:1.5;margin-bottom:10px}
        .group-formula{font-size:.72rem;color:var(--muted);background:#f9fafb;border:1px solid var(--border);border-radius:8px;padding:8px 10px;line-height:1.6}
        .group-formula strong{color:var(--text)}

        .section-title{font-size:1.05rem;font-weight:800;margin:28px 0 14px;display:flex;align-items:center;gap:8px;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .15s both}
        .section-title::before{content:'';width:4px;height:18px;border-radius:2px;background:var(--accent)}

        .table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);background:var(--card);animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .2s both}
        .price-table{width:100%;border-collapse:collapse}
        .price-table thead{position:sticky;top:0;z-index:2}
        .price-table th{background:#f9fafb;border:1px solid var(--border);padding:10px 12px;font-size:.72rem;font-weight:700;text-align:center;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
        .price-table th.col-model{text-align:left;min-width:180px}
        .price-table th.col-type{text-align:left;min-width:80px}
        .price-table td{border:1px solid var(--border);padding:8px 12px;font-size:.8rem;background:var(--card);text-align:center}
        .price-table td.td-left{text-align:left}
        .price-table tr:hover td{background:#faf5ff}
        .model-name{font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
        .provider-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .dot-anthropic{background:#ea580c}
        .dot-openai{background:#16a34a}
        .price-val{font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
        .price-unit{font-size:.66rem;color:var(--muted);font-weight:500}
        .tier-col{font-weight:700;font-size:.78rem}
        .t-low{color:#16a34a;background:#f0fdf4!important}
        .t-mid{color:#d97706;background:#fffbeb!important}
        .t-high{color:#dc2626;background:#fef2f2!important}
        .na-cell{color:#d1d5db;font-style:italic;font-size:.72rem}

        .note{font-size:.76rem;color:var(--muted);margin-top:20px;padding:12px 16px;background:#f9fafb;border-radius:10px;border:1px solid var(--border);line-height:1.7;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) .25s both}
        .note strong{color:var(--text)}
        .note ul{margin:6px 0 0 16px}
        .note li{margin-bottom:3px}

        @media(max-width:768px){
            body{padding:16px 14px}
            .group-grid{grid-template-columns:1fr}
            .price-table th,.price-table td{padding:6px 8px;font-size:.72rem}
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>分组倍率价格表</h1>
        <p>基于官方价格的不同分组倍率，含输入/输出/缓存写入/缓存读取，价格单位 $/M tokens</p>
    </div>

    <div class="group-grid" id="group-cards"></div>

    <div class="section-title">Claude 模型价格对照（含缓存）</div>
    <div class="table-wrap">
        <table class="price-table" id="table-claude"></table>
    </div>

    <div class="section-title">GPT 模型价格对照（含缓存）</div>
    <div class="table-wrap">
        <table class="price-table" id="table-gpt"></table>
    </div>

    <div class="note" id="note-section"></div>
</div>

<script>
var claudeModels = [
    {name:"claude-sonnet-4-6", input:3.00, output:15.00, cache_write:3.75, cache_read:0.30},
    {name:"claude-sonnet-4-5-20250929", input:3.00, output:15.00, cache_write:3.75, cache_read:0.30},
    {name:"claude-opus-4-7", input:5.00, output:25.00, cache_write:6.25, cache_read:0.50},
    {name:"claude-opus-4-6", input:5.00, output:25.00, cache_write:6.25, cache_read:0.50},
    {name:"claude-opus-4-5-20251101", input:5.00, output:25.00, cache_write:6.25, cache_read:0.50},
    {name:"claude-haiku-4-5-20251001", input:1.00, output:5.00, cache_write:1.25, cache_read:0.10},
];

var gptModels = [
    {name:"gpt-5.5", input:5.00, output:25.00, cache_write:0, cache_read:1.25},
    {name:"gpt-5.4", input:2.50, output:15.00, cache_write:0, cache_read:0.25},
    {name:"gpt-5.4-mini", input:0.75, output:4.50, cache_write:0, cache_read:0.075},
    {name:"gpt-5.2", input:1.75, output:14.00, cache_write:0, cache_read:0.175},
    {name:"gpt-5.2-codex", input:1.75, output:14.00, cache_write:0, cache_read:0.175},
    {name:"gpt-5.3-codex", input:1.75, output:14.00, cache_write:0, cache_read:0.175},
    {name:"gpt-image-2", input:0.10, output:0.10, cache_write:0, cache_read:2.00},
];

var groups = [
    {
        rate: 0.15,
        name: "gpt5.5 and gpt-image-2",
        scope: "gpt",
        tag: "GPT 专属",
        tagCss: "tag-gpt",
        css: "t-low",
        desc: "GPT 模型专属超低价通道",
        formula: "实际 $55.34 ÷ 标准 $381.57 = 0.145 ≈ 0.15x"
    },
    {
        rate: 0.4,
        name: "cc逆向",
        scope: "claude",
        tag: "Claude",
        tagCss: "tag-claude",
        css: "t-low",
        desc: "Claude 逆向通道，经济实惠",
        formula: "实际 $64.88 ÷ 标准 $162.19 = 0.40x"
    },
    {
        rate: 0.6,
        name: "小池池",
        scope: "claude",
        tag: "Claude",
        tagCss: "tag-claude",
        css: "t-mid",
        desc: "小池池通道，稳定可靠",
        formula: "实际 $2.15 ÷ 标准 $3.69 = 0.58 ≈ 0.6x"
    },
    {
        rate: 0.7,
        name: "cc逆向低延迟高缓存",
        scope: "claude",
        tag: "Claude",
        tagCss: "tag-claude",
        css: "t-mid",
        desc: "低延迟 + 高缓存命中率，性价比优选",
        formula: "实际 $155.90 ÷ 标准 $229.97 = 0.678 ≈ 0.7x"
    },
    {
        rate: 2.0,
        name: "自建号池满血cc_max",
        scope: "claude",
        tag: "Claude",
        tagCss: "tag-claude",
        css: "t-high",
        desc: "自建号池满血版，最高质量独享资源",
        formula: "实际 $159.33 ÷ 标准 $79.67 = 2.0x"
    },
];

function priceStr(v) {
    if (v === 0) return '-';
    if (v < 0.01) return '$' + v.toFixed(4);
    if (v < 1) return '$' + v.toFixed(3);
    return '$' + v.toFixed(2);
}

function renderGroupCards() {
    var html = '';
    groups.forEach(function(g) {
        html += '<div class="group-card">' +
            '<div class="group-header"><span class="group-badge">' + g.rate + 'x</span><span class="group-tag ' + g.tagCss + '">' + g.tag + '</span></div>' +
            '<div class="group-name">' + g.name + '</div>' +
            '<div class="group-desc">' + g.desc + '</div>' +
        '</div>';
    });
    document.getElementById('group-cards').innerHTML = html;
}

function renderTable(tableId, models, platform) {
    var applicableGroups = groups.filter(function(g) { return g.scope === platform || g.scope === 'all'; });

    var thead = '<thead><tr><th class="col-model">模型</th><th>类型</th><th>官方价格</th>';
    applicableGroups.forEach(function(g) {
        thead += '<th>' + g.rate + 'x<br><span style="font-size:.62rem;font-weight:500;color:#9ca3af">' + g.name + '</span></th>';
    });
    thead += '</tr></thead>';

    var tbody = '<tbody>';
    models.forEach(function(m) {
        var types = [
            {label:'输入', val:m.input},
            {label:'输出', val:m.output},
            {label:'缓存写入', val:m.cache_write},
            {label:'缓存读取', val:m.cache_read},
        ];
        var first = true;
        types.forEach(function(t) {
            if (t.val === 0 && t.label === '缓存写入') return;
            tbody += '<tr>';
            if (first) {
                var dotClass = platform === 'claude' ? 'dot-anthropic' : 'dot-openai';
                tbody += '<td class="td-left" rowspan="' + types.filter(function(x){return !(x.val===0 && x.label==='缓存写入')}).length + '"><div class="model-name"><span class="provider-dot ' + dotClass + '"></span>' + m.name + '</div></td>';
                first = false;
            }
            tbody += '<td class="td-left" style="font-size:.74rem;color:var(--muted)">' + t.label + '</td>';
            tbody += '<td><span class="price-val">' + priceStr(t.val) + '</span> <span class="price-unit">/M</span></td>';
            applicableGroups.forEach(function(g) {
                var tierPrice = t.val * g.rate;
                var css = g.css;
                tbody += '<td class="tier-col ' + css + '"><span class="price-val">' + priceStr(tierPrice) + '</span></td>';
            });
            tbody += '</tr>';
        });
    });
    tbody += '</tbody>';

    document.getElementById(tableId).innerHTML = thead + tbody;
}

function renderNote() {
    document.getElementById('note-section').innerHTML =
        '<strong>倍率说明</strong>' +
        '<ul>' +
        '<li><strong>倍率 = 实际消费 ÷ 官方标准价格</strong>。例如 0.15x 表示仅需官方价格的 15%</li>' +
        '<li><strong>0.15x</strong> 为 GPT 模型专属通道（gpt-5.5、gpt-image-2 等）</li>' +
        '<li><strong>0.4x / 0.6x / 0.7x / 2x</strong> 为 Claude 模型不同通道</li>' +
        '<li>缓存写入（Cache Write）：首次写入缓存的费用；缓存读取（Cache Read）：命中缓存后的费用</li>' +
        '<li>GPT 模型无缓存写入费用，仅有缓存读取</li>' +
        '<li>实际扣费以平台显示为准，汇率 ¥1 = $1（平台内部结算）</li>' +
        '</ul>';
}

document.addEventListener('DOMContentLoaded', function() {
    renderGroupCards();
    renderTable('table-claude', claudeModels, 'claude');
    renderTable('table-gpt', gptModels, 'gpt');
    renderNote();
});
</script>
</body>
</html>
